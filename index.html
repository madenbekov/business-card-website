<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Бекмырза Маденбеков</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="cinema"></div>
<div class="intro-overlay"></div>

<!-- MAIN -->
<div id="main" class="split">

  <div class="theatre side"></div>

  <div class="dev side">
    <div class="matrix"></div>
  </div>

  <div class="center">
    <div class="avatar"></div>

    <h1 class="name">Бекмырза Маденбеков</h1>
    <div class="alt-name">MyrzaMaden</div>

    <div class="buttons">
      <button id="toPortfolio" class="btn portfolio">Портфолио</button>
      <button id="toResume" class="btn resume">Резюме</button>
    </div>
  </div>

</div>

<!-- PORTFOLIO -->
<section id="portfolio" class="page">
  <h1>Портфолио</h1>
  <p>Творческая часть: театр, фото, проекты.</p>
  <button class="back">← Назад</button>
</section>

<!-- RESUME -->
<section id="resume" class="page">
  <h1>Резюме</h1>
  <p>Профессиональная часть: опыт, навыки, CV.</p>
  <button class="back">← Назад</button>
</section>

<script src="app.js"></script>
</body>
</html>
